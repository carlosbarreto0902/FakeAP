<!DOCTYPE html>
<html>
<head>
    <title>Acceso Requerido</title>
</head>
<body style="font-family: sans-serif; text-align: center; margin-top: 50px;">
    <h2>🔒 Portal de autenticación de red</h2>
    <p>Has intentado acceder a <strong>{{ host }}{{ path }}</strong> desde la IP <strong>{{ ip }}</strong>.</p>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="usuario" placeholder="Usuario" required><br><br>
        <input type="password" name="clave" placeholder="Contraseña" required><br><br>
        <button type="submit">Iniciar sesión</button>
    </form>
</body>
</html>
